spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://db.tncuiwvsvyixivsfhpqv.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.generate-ddl=true

springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.security=DEBUG

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-response=true
server.error.include-message=always
server.error.include-stacktrace=on_param

cors.originPatterns=*

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_PROJECT_BASE_URL:https://tncuiwvsvyixivsfhpqv.supabase.co}/auth/v1
supabase.jwt.audience=${SUPABASE_JWT_AUDIENCE:authenticated}

spring.jackson.mapper.ACCEPT_CASE_INSENSITIVE_PROPERTIES=true

openfoodfacts.baseurl=${OPENFOODFACTS_BASEURL:https://world.openfoodfacts.net}
openfoodfacts.user-id=${OPENFOODFACTS_USER_ID:inoventory}
openfoodfacts.password=${OPENFOODFACTS_PASSWORD:}

product.cache.ttl=5m
product.cache.max-size=100

app.required-env=DB_PASSWORD
